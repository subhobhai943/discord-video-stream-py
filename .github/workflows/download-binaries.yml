name: Download and Push Binaries

on:
  workflow_dispatch:
  schedule:
    # Run at 00:00 on the first day of every month to keep binaries updated
    - cron: '0 0 1 * *'

jobs:
  download-binaries:
    name: Download Cross-Platform Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create bin directory
        run: mkdir -p discord_video_stream/bin

      - name: Download and Extract Binaries
        run: python scripts/download_binaries.py

      - name: Check for changes
        id: check_changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add discord_video_stream/bin/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push binaries
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git commit -m "chore: update bundled cross-platform ffmpeg and yt-dlp binaries [skip ci]"
          for i in 1 2 3; do
            if git push; then
              break
            elif [ $i -lt 3 ]; then
              echo "Push failed, retrying in $((2 ** i)) seconds..."
              sleep $((2 ** i))
            fi
          done

      - name: Create summary
        run: |
          echo "## Binaries Downloaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for platform in windows-x64 linux-x64 linux-arm64 macos-x64 macos-arm64; do
            echo "### $platform" >> $GITHUB_STEP_SUMMARY
            ls -lh discord_video_stream/bin/$platform/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No binaries found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done
          echo "**Total size:** $(du -sh discord_video_stream/bin/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
