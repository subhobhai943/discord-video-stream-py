name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install hatchling hatch build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check dist contents
        run: |
          pip install twine
          twine check dist/*
          echo "--- Built artifacts ---"
          ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/discord-video-stream-py
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI (pre-release only)
    needs: build
    runs-on: ubuntu-latest
    # Only run on pre-releases (e.g. v0.1.0a1, v0.1.0b1, v0.1.0rc1)
    if: github.event.release.prerelease == true
    environment:
      name: testpypi
      url: https://test.pypi.org/p/discord-video-stream-py
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
          repository-url: https://test.pypi.org/legacy/
